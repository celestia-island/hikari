---
name: Run Tests

on: [push, pull_request]

jobs:
  rustfmt:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v3

      - name: Install apt dependencies
        run: sudo apt-get install libasound2-dev libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run cargo fmt -- --check
        run: cargo +nightly fmt --all -- --check --unstable-features

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v3

      - name: Install apt dependencies
        run: sudo apt-get install libasound2-dev libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip2

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run cargo clippy
        run: cargo clippy --all --all-features
        env:
          RUSTFLAGS: '--cfg releasing'

      - name: Lint wasm32-wasip2 target
        run: cargo clippy --workspace --exclude hikari-e2e --all-features --target wasm32-wasip2
        env:
          RUSTFLAGS: '--cfg releasing'

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v3

      - name: Install apt dependencies
        run: sudo apt-get install libasound2-dev libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip2

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run cargo test
        run: cargo test --all-features --all
        env:
          RUSTFLAGS: '--cfg releasing'

      - name: Check wasm32-wasip2 target
        run: cargo check --workspace --exclude hikari-e2e --all-features --target wasm32-wasip2
        env:
          RUSTFLAGS: '--cfg releasing'

  website-build:
    name: Build website with tairitsu-packager
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v3

      - name: Checkout tairitsu
        run: git clone --depth 1 https://github.com/celestia-island/tairitsu.git ../tairitsu

      - name: Install apt dependencies
        run: sudo apt-get install libasound2-dev libudev-dev python3 python3-pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip2

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Compile website SCSS
        run: python3 scripts/build/compile_scss.py

      - name: Build website
        run: cd examples/website && cargo run --manifest-path ../../../tairitsu/packages/packager/Cargo.toml -- --manifest-path Cargo.toml build
