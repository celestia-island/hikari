name: Clippy

on:
  pull_request:
    paths:
      - '.github/workflows/clippy.yml'
      - 'packages/**/*'
      - 'examples/**/*'
      - 'Cargo.toml'
  push:
    branches: [master, dev]

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v7

      - name: Cache MDI icons
        id: mdi-cache
        uses: actions/cache@v4
        with:
          path: icons/mdi
          key: mdi-icons-v1

      - name: Fetch MDI icons
        if: steps.mdi-cache.outputs.cache-hit != 'true'
        run: python3 scripts/icons/fetch_mdi_icons.py

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: |
          cargo clippy \
            --all-targets \
            --all-features \
            -- -D warnings
