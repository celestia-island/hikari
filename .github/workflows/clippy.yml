name: Clippy

on:
  pull_request:
    paths:
      - '.github/workflows/clippy.yml'
      - 'packages/**/*'
      - 'examples/**/*'
      - 'Cargo.toml'
  push:
    branches: [master, dev]

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy (native)
        run: |
          cargo clippy \
            --all-targets \
            --all-features \
            -- -D warnings

      - name: Run clippy (wasm32-wasip2)
        run: |
          cargo clippy \
            --workspace \
            --exclude hikari-e2e \
            --all-features \
            --target wasm32-wasip2 \
            -- -D warnings
