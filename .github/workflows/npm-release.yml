name: npm Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.3.0)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @celestia-island/hikari to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: |
          cd packages/vue
          npm install

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Publishing @celestia-island/hikari@$v"

      - name: Bump version
        shell: bash
        run: |
          cd packages/vue
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish
        run: |
          cd packages/vue
          npm publish --access public --provenance
