name: Visual Regression

on:
  pull_request:
    paths:
      - '.github/workflows/visual-regression.yml'
      - 'packages/**/*'
      - 'examples/**/*'
      - 'docs/**/*'
      - '**.scss'
      - '**.css'
  push:
    branches: [master, dev]
  workflow_dispatch:

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Visual Regression Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout hikari
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout tairitsu (sibling)
        uses: actions/checkout@v4
        with:
          repository: tairitsu/tairitsu
          path: ../tairitsu
          ref: master

      - name: Cache MDI icons
        id: mdi-cache
        uses: actions/cache@v4
        with:
          path: packages/icons/src/generated
          key: mdi-icons-${{ hashFiles('scripts/icons/fetch_mdi_icons.py') }}

      - name: Fetch MDI icons
        if: steps.mdi-cache.outputs.cache-hit != 'true'
        run: python3 scripts/icons/fetch_mdi_icons.py

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Python dependencies
        run: |
          pip install Pillow requests playwright
          playwright install chromium --with-deps

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Build website
        run: just build-website

      - name: Start HTTP server
        run: |
          cd public && python3 -m http.server 3000 &
          echo "Server PID: $!"
          sleep 2
          curl -sf http://localhost:3000/ > /dev/null && echo "Server ready" || echo "Server failed"

      - name: Capture screenshots
        run: |
          python3 scripts/visual-ci/capture_ci.py \
            --url http://localhost:3000 \
            --output target/screenshots \
            --wait 10

      - name: Run visual comparison
        if: always()
        run: |
          python3 scripts/visual-ci/compare_ci.py \
            --baseline-dir tests/visual/baseline/default \
            --candidate-dir target/screenshots \
            --output target/visual-diff \
            --threshold 30 \
            --max-diff-ratio 0.01
        continue-on-error: true

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-results
          path: |
            target/visual-diff/
            target/screenshots/
          retention-days: 14

      - name: Check results
        if: always()
        run: |
          if [ -f target/visual-diff/result.json ]; then
            python3 -c "
            import json, sys
            with open('target/visual-diff/result.json') as f:
                r = json.load(f)
            print(f\"Total: {r['total']}, Passed: {r['passed']}, Failed: {r['failed']}\")
            for name, info in r.get('results', {}).items():
                if not info.get('passed', False):
                    print(f\"  FAIL: {name} ({info.get('diff_pct', '?')}% diff)\")
            sys.exit(0 if r.get('all_passed', False) else 1)
            "
          else
            echo "::warning::No result.json found — possibly no baselines yet"
            exit 0
          fi
