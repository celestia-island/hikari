services:
  website:
    build:
      context: ..
      dockerfile: docker/website.Dockerfile
    container_name: hikari-website
    ports:
      - "3000:3000"
    environment:
      - RUST_BACKTRACE=1
      - RUST_LOG=info
    command: python3 -m http.server 3000 --directory /hikari/public
    networks:
      - hikari-network

  chrome:
    image: selenium/standalone-chrome:latest
    container_name: hikari-chrome
    ports:
      - "4444:4444"
      - "5900:5900"
    environment:
      - SE_NODE_SESSION_TIMEOUT=120
    shm_size: 2gb
    networks:
      - hikari-network
    volumes:
      - /dev/shm:/dev/shm

networks:
  hikari-network:
    driver: bridge
