<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikari UI - Component Library</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo.png">
    <link rel="shortcut icon" type="image/png" href="/images/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #main {
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #4a9eff;
        }
    </style>

    <!-- Theme and language switcher scripts -->
    <script src="/theme.js"></script>
    <script src="/lang.js"></script>

    <!-- Animation system styles (compiled from SCSS) -->
    <link rel="stylesheet" href="/styles/animations.css">

    <!-- Dynamic documentation styles -->
    <link rel="stylesheet" href="/assets/doc-styles.css">
    <style>
        /* Theme toggle button styles */
        .hi-theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            margin-left: 8px;
            padding: 0;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: var(--hi-color-text-primary, #475569);
            transition: background-color 0.2s, color 0.2s;
        }
        .hi-theme-toggle:hover {
            background-color: var(--hi-color-bg-tertiary, #f1f5f9);
        }
        .hi-theme-toggle:focus-visible {
            outline: 2px solid var(--hi-color-border-focus, #4a9eff);
            outline-offset: 2px;
        }
        .hi-theme-toggle svg {
            width: 20px;
            height: 20px;
        }
        .theme-icon-sun { display: none; }
        .theme-icon-moon { display: block; }
        /* In dark mode, show sun icon by default (will be overridden by JS) */
        [data-theme="tairitsu"] .theme-icon-sun { display: block; }
        [data-theme="tairitsu"] .theme-icon-moon { display: none; }

        /* Language toggle button styles */
        .hi-lang-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            height: 36px;
            margin-left: 8px;
            padding: 0 8px;
            background: transparent;
            border: 1px solid var(--hi-color-border-primary, #e2e8f0);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--hi-color-text-primary, #475569);
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }
        .hi-lang-toggle:hover {
            background-color: var(--hi-color-bg-tertiary, #f1f5f9);
            border-color: var(--hi-color-border-secondary, #cbd5e1);
        }
        .hi-lang-toggle:focus-visible {
            outline: 2px solid var(--hi-color-border-focus, #4a9eff);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Hikari UI...</div>
    <div id="main"></div>

    <!-- Load WASM module -->
    <script type="module">
        import init, { hydrate } from '/assets/website.js';

        async function main() {
            try {
                // Initialize WASM module
                await init('/assets/website_bg.wasm');

                // Hide loading indicator
                document.getElementById('loading').style.display = 'none';

                // Launch Dioxus application
                hydrate();
            } catch (error) {
                console.error('Failed to load WASM:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #f55;">Failed to load: ${error.message}</div>
                `;
            }
        }

        main();
    </script>

    <!-- Animation system JavaScript -->
    <script src="/js/animations.js"></script>
</body>
</html>
