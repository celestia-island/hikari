[package]
name = "hikari-animation"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Animation hooks, easing functions and transition utilities for the Hikari design system"
repository.workspace = true
license-file.workspace = true
keywords = ["animation", "easing", "tween", "state-machine", "design-system"]
categories = ["gui", "wasm"]

[dependencies]
# Core dependencies
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
slotmap = "^1.0"
once_cell = "^1.17"

# Tairitsu framework integration
# Local development redirects these to working copies via ~/.cargo/config.toml [patch.crates-io].
tairitsu-vdom = "^0.5"
tairitsu-hooks = "^0.5"
tairitsu-style = "^0.5"

# Dioxus framework (required by dioxus feature)
dioxus = { version = "^0.7", optional = true }

# WASM dependencies (for wasm feature)
wasm-bindgen = { version = "^0.2", optional = true }
web-sys = { version = "^0.3", optional = true, features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "console",
    "DomRect",
    "MouseEvent",
    "CssStyleDeclaration",
    "Performance",
    "MediaQueryList",
    "DomTokenList",
] }
js-sys = { version = "^0.3", optional = true }

[features]
default = []
wasm = ["dep:wasm-bindgen", "dep:web-sys", "dep:js-sys"]
dioxus = ["wasm", "dep:dioxus"]
