[package]
name = "hikari-animation"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"

[dependencies]
# Core dependencies
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
slotmap = "1.0"
once_cell = "1.17"

# Tairitsu framework integration
tairitsu-vdom = { path = "../../../tairitsu/packages/vdom" }
tairitsu-hooks = { path = "../../../tairitsu/packages/hooks" }
tairitsu-style = { path = "../../../tairitsu/packages/style" }

# WASM dependencies (for wasm feature)
wasm-bindgen = { version = "0.2", optional = true }
web-sys = { version = "0.3", optional = true, features = [
    "Window", "Document", "Element", "HtmlElement",
    "console", "DomRect", "MouseEvent",
    "CssStyleDeclaration", "Performance", "MediaQueryList",
] }
js-sys = { version = "0.3", optional = true }

[features]
default = []
wasm = ["dep:wasm-bindgen", "dep:web-sys", "dep:js-sys"]
dioxus = ["wasm"]
