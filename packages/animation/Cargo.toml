[package]
name = "hikari-animation"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
# Core dependencies
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
slotmap = "1.0"
once_cell = "1.17"
js-sys = "0.3"
anyhow = "1"

# Color utilities (local package)
hikari-palette = { path = "../palette" }

# WASM dependencies (via tairitsu WIT bindings)
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "console",
    "DomRect",
    "MouseEvent",
    "CssStyleDeclaration",
    "Performance",
    "MediaQueryList",
    "DomTokenList",
] }

# Tairitsu framework integration
tairitsu-vdom = { path = "../../../tairitsu/packages/vdom" }
tairitsu-style = { path = "../../../tairitsu/packages/style" }
