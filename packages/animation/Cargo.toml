[package]
name = "hikari-animation"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
# Core dependencies
slotmap = "1.0"
anyhow = "1"

# Color utilities (local package)
hikari-palette = { path = "../palette" }

# Tairitsu framework integration
tairitsu-vdom = { path = "../../../tairitsu/packages/vdom" }
tairitsu-style = { path = "../../../tairitsu/packages/style" }
tairitsu-web = { path = "../../../tairitsu/packages/web" }

# Legacy WASM dependencies (optional, for backward compatibility)
wasm-bindgen = { version = "0.2", optional = true }
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "console",
    "DomRect",
    "MouseEvent",
    "CssStyleDeclaration",
    "Performance",
    "MediaQueryList",
    "DomTokenList",
], optional = true }
js-sys = { version = "0.3", optional = true }

[features]
default = []
legacy = ["wasm-bindgen", "web-sys", "js-sys"]
