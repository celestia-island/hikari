[package]
name = "hikari-animation"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"

[dependencies]
# Core dependencies
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
slotmap = "1.0"
once_cell = "1.17"

# Tairitsu framework integration
tairitsu-vdom = { path = "../../../tairitsu/packages/vdom" }
tairitsu-hooks = { path = "../../../tairitsu/packages/hooks" }

[features]
default = []
