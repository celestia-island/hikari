[package]
name = "hikari-builder"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
description = "Build-time helpers for the Hikari design system (icon generation, SCSS processing)"
repository.workspace = true
keywords = ["build-tools", "icons", "scss", "design-system", "code-generation"]
categories = ["development-tools::build-utils"]

[lib]
path = "src/lib.rs"

[dependencies]

anyhow = "^1.0"
flate2 = "^1"
lightningcss = "^1.0.0-alpha.68"
quick-xml = { version = "^0.35", features = ["serialize"] }
regex = "^1"
serde = { workspace = true, features = ["derive"] }
serde_json = "^1.0"
[build-dependencies]

anyhow = "^1"
grass = "^0.13"
