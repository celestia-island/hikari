[package]
name = "hikari-builder"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Build-time code generation for CSS and SVG processing in the Hikari design system"
repository.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
lightningcss = "1.0.0-alpha.68"
quick-xml = { version = "0.35", features = ["serialize"] }
regex = "^1"

[build-dependencies]
tairitsu-packager = { path = "../../../tairitsu/packages/packager", default-features = false }
anyhow = "^1"
