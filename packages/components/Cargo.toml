[package]
name = "hikari-components"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
doctest = false

[features]
default = ["basic", "feedback", "navigation", "layout", "data", "display", "entry", "production"]

# Component groups (shortcuts) - enable multiple components at once
basic = ["button", "input", "card", "badge", "image", "avatar", "checkbox", "switch", "radio_group", "select", "slider", "textarea", "icon_button", "arrow", "canvas"]
feedback = ["alert", "toast", "tooltip", "modal"]
navigation = ["menu", "tabs", "breadcrumb"]
layout = ["layout-component", "header", "aside", "content", "footer"]
data = ["table", "tree", "pagination"]
display = ["tag", "empty", "comment", "description_list", "qrcode", "carousel", "calendar", "timeline"]
entry = ["number_input", "search", "cascader", "transfer", "auto_complete"]
production = ["code_highlight", "video_player", "rich_text_editor"]

# Individual component features (fine-grained control)
button = []
input = []
card = []
badge = []
image = []
avatar = []
arrow = []
canvas = []
checkbox = []
switch = []
radio_group = []
select = []
slider = []
textarea = []
file_upload = []
form_field = []
date_picker = []
icon_button = []
alert = []
toast = []
tooltip = []
modal = []
popover = []
drawer = []
dropdown = []
progress = []
skeleton = []
spin = []
spotlight = []
glow = []
menu = []
tabs = []
breadcrumb = []
steps = []
layout-component = []
header = []
aside = []
content = []
footer = []
table = []
tree = []
pagination = []
tag = []
empty = []
comment = []
description_list = []
qrcode = []
carousel = []
calendar = []
timeline = []
code_highlight = []
video_player = []
rich_text_editor = []
number_input = []
search = []
cascader = []
transfer = []
auto_complete = []

[dependencies]
# Hikari design system
hikari-palette = { path = "../palette" }
hikari-theme = { path = "../theme" }
hikari-animation = { path = "../animation", default-features = false }
hikari-icons = { path = "../icons", default-features = false, features = ["tairitsu"] }

# Tairitsu framework (replaces Dioxus)
tairitsu-vdom = { path = "../../../tairitsu/packages/vdom" }
tairitsu-hooks = { path = "../../../tairitsu/packages/hooks" }
tairitsu-macros = { path = "../../../tairitsu/packages/macros" }

# Global static variables
once_cell = "1.19"

# QR code generation
qrcode = "0.14"

# Browser WASM-specific dependencies (not for WASI)
[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "Element", "HtmlElement",
    "HtmlCanvasElement", "CanvasRenderingContext2d",
    "MutationObserver", "MutationObserverInit", "ResizeObserver",
] }
gloo = { version = "0.11", features = ["futures", "timers"] }

[build-dependencies]
tairitsu-packager = { path = "../../../tairitsu/packages/packager" }
anyhow = "^1"

