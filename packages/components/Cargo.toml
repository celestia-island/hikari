[package]
name = "hikari-components"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Core UI components (40+) for the Hikari design system"
repository.workspace = true

[lib]
doctest = false

[features]
default = [
    "basic",
    "feedback",
    "navigation",
    "layout",
    "data",
    "display",
    "entry",
    "production",
]

# Enable full custom scrollbar implementation (requires platform DOM APIs)
native-scrollbars = []

# Component groups (shortcuts) - enable multiple components at once
basic = [
    "button",
    "input",
    "card",
    "badge",
    "image",
    "avatar",
    "checkbox",
    "switch",
    "radio_group",
    "select",
    "slider",
    "textarea",
    "icon_button",
    "arrow",
    "canvas",
]
feedback = ["alert", "toast", "tooltip", "modal"]
navigation = ["menu", "tabs", "breadcrumb"]
layout = ["layout-component", "header", "aside", "content", "footer"]
data = ["table", "tree", "pagination"]
display = [
    "tag",
    "empty",
    "comment",
    "description_list",
    "qrcode",
    "carousel",
    "calendar",
    "timeline",
]
entry = ["number_input", "search", "cascader", "transfer", "auto_complete"]
production = ["code_highlight", "video_player", "rich_text_editor"]

# Individual component features (fine-grained control)
button = []
input = []
card = []
badge = []
image = []
avatar = []
arrow = []
canvas = []
checkbox = []
switch = []
radio_group = []
select = []
slider = []
textarea = []
file_upload = []
form_field = []
date_picker = []
icon_button = []
alert = []
toast = []
tooltip = []
modal = []
popover = []
drawer = []
dropdown = []
progress = []
skeleton = []
spin = []
spotlight = []
glow = []
menu = []
tabs = []
breadcrumb = []
steps = []
layout-component = []
header = []
aside = []
content = []
footer = []
table = []
tree = []
pagination = []
tag = []
empty = []
comment = []
description_list = []
qrcode = []
carousel = []
calendar = []
timeline = []
code_highlight = []
video_player = []
rich_text_editor = []
number_input = []
search = []
cascader = []
transfer = []
auto_complete = []

[dependencies]
# Hikari design system
hikari-palette = { version = "^0.1", path = "../palette" }
hikari-theme = { version = "^0.1", path = "../theme" }
hikari-icons = { version = "^0.1", path = "../icons", default-features = false, features = [
    "tairitsu",
] }

# Tairitsu framework (replaces Dioxus)
tairitsu-vdom = "^0.4"
tairitsu-hooks = "^0.4"
tairitsu-macros = "^0.4"
tairitsu-style = "^0.4"

# Global static variables
once_cell = "1.19"

# QR code generation
qrcode = "0.14"

# Date/time handling
chrono = { workspace = true }

[build-dependencies]
tairitsu-packager = { version = "^0.4", default-features = false }
hikari-theme = { version = "^0.1", path = "../theme" }
anyhow = "^1"
serde_json = "^1"
