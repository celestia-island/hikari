[package]
name = "hikari-e2e"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
# Selenium WebDriver for E2E testing
thirtyfour = { version = "0.34", features = ["reqwest"] }

# Chromiumoxide for headless Chrome screenshots - updated for Chrome 144 compatibility
chromiumoxide = { version = "0.8", features = ["tokio-runtime"] }

# HTML parsing and assertions
scraper = "0.20"

# HTTP client for direct SSR HTML fetch in no-JS tests
reqwest = { version = "0.12", features = [
  "rustls-tls",
], default-features = false }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Logging and tracing
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serde for config
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"

# Utilities
anyhow = "^1"
chrono = "^0.4"
futures = "^0.3"

# Command line parsing
clap = { version = "^4", features = ["derive"] }

[[bin]]
name = "hikari-e2e"
path = "src/main.rs"

[[bin]]
name = "hikari-screenshot"
path = "src/screenshot_bin.rs"

[[bin]]
name = "hikari-visual-quality"
path = "src/bin/visual_quality_test.rs"

[[bin]]
name = "test-all-pages"
path = "src/bin/test_all_pages.rs"

[[bin]]
name = "hikari-browser-debug"
path = "src/bin/browser_debug.rs"

[[bin]]
name = "run-ssr-e2e"
path = "src/bin/run_ssr_e2e.rs"

[dev-dependencies]
