[package]
name = "hikari-e2e"
version = "0.1.0"
description = "E2E testing framework for Hikari UI components"
authors = ["Hikari Contributors"]
license = "MIT OR Apache-2.0"
edition = "2024"
autobins = false

[dependencies]

# Utilities
anyhow = "^1"
# Chromiumoxide for headless Chrome screenshots - updated for Chrome 144 compatibility
chromiumoxide = { version = "^0.9" }
chrono = "^0.4"
# Command line parsing
clap = { version = "^4", features = ["derive"] }
futures = "^0.3"
# Logging and tracing
log = "^0.4"
# HTTP client for direct SSR HTML fetch in no-JS tests
reqwest = { version = "^0.13", features = [
  "rustls-no-provider",
], default-features = false }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
# HTML parsing and assertions
scraper = "^0.20"
# Serde for config
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
# Selenium WebDriver for E2E testing
thirtyfour = { version = "^0.34", features = ["reqwest"] }
# Async runtime
tokio = { version = "^1", features = ["full"] }
tracing = "^0.1"
tracing-subscriber = { version = "^0.3", features = ["env-filter"] }
[[bin]]
name = "hikari-e2e"
path = "src/main.rs"

[[bin]]
name = "hikari-screenshot"
path = "src/screenshot_bin.rs"

[[bin]]
name = "hikari-visual-quality"
path = "src/bin/visual_quality_test.rs"

[[bin]]
name = "test-all-pages"
path = "src/bin/test_all_pages.rs"

[[bin]]
name = "hikari-browser-debug"
path = "src/bin/browser_debug.rs"

[[bin]]
name = "run-ssr-e2e"
path = "src/bin/run_ssr_e2e.rs"

[dev-dependencies]