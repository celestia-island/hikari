[package]
name = "hikari-extra-components"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Advanced UI components (node graph, rich text, etc.) for the Hikari design system"
repository.workspace = true

[lib]
doctest = false

[dependencies]
# Workspace dependencies
hikari-palette = { version = "^0.2", path = "../palette" }
hikari-theme = { version = "^0.2", path = "../theme" }
hikari-icons = { version = "^0.2", path = "../icons" }

# Serialization
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"

# VDOM
tairitsu-vdom = "^0.5"

# Utilities
lazy_static = "^1"
