[package]
name = "hikari-extra-components"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Advanced UI components (node graph, rich text, etc.) for the Hikari design system"
repository.workspace = true
keywords = ["ui", "components", "node-graph", "design-system", "wasm"]
categories = ["gui", "wasm"]

[lib]
doctest = true

[dependencies]
# Workspace dependencies
hikari-palette = { version = "^0.2", path = "../palette" }
hikari-theme = { version = "^0.2", path = "../theme" }
hikari-icons = { version = "^0.2", path = "../icons" }
hikari-components = { version = "^0.2", path = "../components" }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Error handling
anyhow = { workspace = true }

# VDOM
tairitsu-vdom = "^0.5"
