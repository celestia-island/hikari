[package]
name = "hikari-extra-components"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
description = "Advanced UI components (node graph, rich text editor, timeline) for the Hikari design system"

[lib]
doctest = false

[dependencies]

hikari-icons = { version = "^0.3", path = "../icons" }
# Workspace dependencies
hikari-palette = { version = "^0.3", path = "../palette" }
hikari-theme = { version = "^0.3", path = "../theme" }

# Utilities
lazy_static = "^1"
# Serialization
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
