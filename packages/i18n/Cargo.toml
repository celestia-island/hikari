[package]
name = "hikari-i18n"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Internationalization support for the Hikari design system"
repository.workspace = true

[lib]
doctest = false

[dependencies]
# Workspace dependencies
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
anyhow = { workspace = true }

# For TOML parsing
toml = "^0.8"

# Tairitsu i18n (re-exported from tairitsu-web)
tairitsu-web = { path = "../../../tairitsu/packages/web", default-features = false, features = [
  "i18n",
] }
