[package]
name = "hikari-icons"
version = "0.1.0"
edition = "2021"

[features]
default = []
dioxus = []
tairitsu = ["tairitsu-vdom", "tairitsu-hooks", "tairitsu-macros"]
dynamic-fetch = []
dynamic-fetch-warnings = []

[build-dependencies]
hikari-builder = { path = "../builder" }
anyhow = "^1"

[dependencies]
# Tairitsu framework (optional)
tairitsu-vdom = { path = "../../../tairitsu/packages/vdom", optional = true }
tairitsu-hooks = { path = "../../../tairitsu/packages/hooks", optional = true }
tairitsu-macros = { path = "../../../tairitsu/packages/macros", optional = true }

# Hikari design system
hikari-animation = { path = "../animation", default-features = false }

# Data serialization
serde.workspace = true
ron.workspace = true

# WASM dependencies (only for web target)
[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Window", "Element"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
reqwest = { version = "^0.12", features = ["json"] }
once_cell = "^1"
