[package]
name = "hikari-icons"
version = "0.1.0"
edition = "2021"

[features]
default = ["dioxus"]
dioxus = ["dep:dioxus", "hikari-animation/dioxus"]
dynamic-fetch = []
dynamic-fetch-warnings = []

[build-dependencies]
hikari-builder = { path = "../builder" }

[dependencies]
# MCP / network and protocols (optional for tairitsu compatibility)
dioxus = { workspace = true, optional = true }

# Styling (enable wasm feature when dioxus is enabled)
hikari-animation = { path = "../animation", default-features = false, optional = true, features = ["wasm"] }

# Data serialization
serde.workspace = true
ron.workspace = true

# WASM dependencies (only for web target)
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
web-sys = { workspace = true }
wasm-bindgen-futures = { workspace = true }
reqwest = { version = "^0.12", features = ["json"] }
once_cell = "^1"
ron = "^0.8"
