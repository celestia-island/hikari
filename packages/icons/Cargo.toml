[package]
name = "hikari-icons"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Material Design Icons (MDI) integration for the Hikari design system"
repository.workspace = true
keywords = ["icons", "mdi", "material-design", "design-system", "ui"]
categories = ["gui", "wasm"]

include = [
    "build.rs",
    "src/**/*.rs",
    "tests/**/*.rs",
    "icons.txt",
    "icon_data.dat",
    "README.md",
]

[features]
default = []
tairitsu = ["tairitsu-vdom", "tairitsu-macros"]
dynamic-fetch = ["dep:reqwest", "dep:ron"]

[dependencies]
tairitsu-vdom = { version = "^0.5", optional = true }
anyhow = { workspace = true }
tairitsu-macros = { version = "^0.5", optional = true }

serde.workspace = true
ron = { version = "^0.8", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
reqwest = { version = "^0.12", features = ["json"], optional = true }
