[package]
name = "hikari-icons"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Material Design Icons (MDI) integration for the Hikari design system"
repository.workspace = true
license-file.workspace = true
keywords = ["icons", "mdi", "material-design", "design-system", "ui"]
categories = ["gui", "wasm"]

# Note: icon *selection* and *dynamic-fetch* are NOT Cargo features. They are
# declared in the consuming workspace's root Cargo.toml:
#
#   [workspace.metadata.hikari.icons]
#   set = ["chevron-left", "menu"]   # explicit list; omit to auto-discover
#   dynamic-fetch = false            # fetch at runtime instead of embedding
#
# The build script turns these into `cargo:rustc-cfg=hikari_icons_dynamic_fetch`
# and the corresponding `set` selection. Only framework-binding options remain
# as features below.
[features]
default = []
dioxus = ["dep:dioxus"]
tairitsu = ["tairitsu-vdom", "tairitsu-hooks", "tairitsu-macros"]

[build-dependencies]
hikari-builder = { path = "../builder" }
anyhow = "^1"

[dependencies]
# Dioxus framework (optional)
dioxus = { version = "^0.7", optional = true }

# Tairitsu framework (optional)
# Local development redirects these to working copies via ~/.cargo/config.toml [patch.crates-io].
tairitsu-vdom = { version = "^0.5", optional = true }
tairitsu-hooks = { version = "^0.5", optional = true }
tairitsu-macros = { version = "^0.5", optional = true }

# Hikari design system
hikari-animation = { path = "../animation", default-features = false }

# Data serialization
serde.workspace = true
ron.workspace = true

# WASM dependencies for runtime dynamic icon fetching. Gated on the
# build-script-emitted cfg, not a Cargo feature.
[target.'cfg(all(hikari_icons_dynamic_fetch, target_arch = "wasm32"))'.dependencies]
web-sys = { version = "^0.3", features = ["console"] }
reqwest = { version = "^0.12", features = ["json"] }
