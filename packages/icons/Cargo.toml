[package]
name = "hikari-icons"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Material Design Icons (MDI) integration for the Hikari design system"
repository.workspace = true

[features]
default = []
tairitsu = ["tairitsu-vdom", "tairitsu-hooks", "tairitsu-macros"]
dynamic-fetch = ["dep:web-sys", "dep:reqwest"]
dynamic-fetch-warnings = []

[build-dependencies]

[dependencies]
# Tairitsu framework (optional)
tairitsu-vdom = { version = "^0.5", optional = true }
tairitsu-hooks = { version = "^0.5", optional = true }
tairitsu-macros = { version = "^0.5", optional = true }

# Hikari design system
hikari-animation = { version = "^0.2", path = "../animation", default-features = false }

# Data serialization
serde.workspace = true
ron.workspace = true

# WASM dependencies for dynamic icon fetching
[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["console"], optional = true }
reqwest = { version = "^0.12", features = ["json"], optional = true }
