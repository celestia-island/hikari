[package]
name = "hikari-palette"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
description = "Ready-to-use palette system: themed palettes plus opt-in color collections, with a small Color core"
keywords = ["color", "palette", "design-system", "ui", "theme"]
categories = ["gui", "wasm"]

[lib]
doctest = true

[dependencies]
serde = { workspace = true, features = ["derive"] }
yuuka = "^0.6"

# Color collections are NOT Cargo features. The consuming workspace declares
# which collections it wants in its root Cargo.toml:
#
#   [workspace.metadata.hikari]
#   collections = ["chinese"]
#
# The build script reads that, emits `cargo:rustc-cfg=hikari_collection_<name>`
# per collection, and generates the corresponding `pub const` block from
# data/<name>.toml. Source modules are gated on those cfg flags.

[build-dependencies]
regex-lite = "^0.1"
