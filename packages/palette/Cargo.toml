[package]
name = "hikari-palette"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
description = "Ready-to-use palette system: themed palettes plus opt-in color collections, with a small Color core"
keywords = ["color", "palette", "design-system", "ui", "theme"]
categories = ["gui", "wasm"]

[lib]
doctest = true

[dependencies]

yuuka = "^0.6"

serde = { workspace = true, features = ["derive"] }
[build-dependencies]

regex-lite = "^0.1"
