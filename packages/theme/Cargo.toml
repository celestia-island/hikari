[package]
name = "hikari-theme"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
doctest = false

[features]
default = ["scss"]
scss = []  # SCSS compilation

[dependencies]
# Hikari palette
hikari-palette = { path = "../palette" }

# Tairitsu framework (for theme context)
tairitsu-vdom = { path = "../../../tairitsu/packages/vdom" }
tairitsu-hooks = { path = "../../../tairitsu/packages/hooks" }
tairitsu-macros = { path = "../../../tairitsu/packages/macros" }
