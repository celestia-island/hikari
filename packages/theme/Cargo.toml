[package]
name = "hikari-theme"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true

[lib]
doctest = false

[features]
default = ["scss"]
scss = []  # SCSS compilation

[dependencies]
# Hikari palette
hikari-palette = { path = "../palette" }

# Tairitsu framework (for theme context)
# Local development redirects these to working copies via ~/.cargo/config.toml [patch.crates-io].
tairitsu-vdom = "^0.5"
tairitsu-hooks = "^0.5"
tairitsu-macros = "^0.5"

[build-dependencies]
tairitsu-packager = "^0.5"
anyhow = "^1"
