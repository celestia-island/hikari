[package]
name = "hikari-theme"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Theme system with SCSS/CSS variable generation for the Hikari design system"
repository.workspace = true
keywords = ["theme", "scss", "css-variables", "design-system", "ui"]
categories = ["gui", "wasm"]

[lib]
doctest = true

[dependencies]
# Hikari palette
hikari-palette = { version = "^0.2", path = "../palette" }

[build-dependencies]
tairitsu-packager = { version = "^0.5", default-features = false }
anyhow = "^1"
