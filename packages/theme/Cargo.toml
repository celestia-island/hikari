[package]
name = "hikari-theme"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Theme system with SCSS/CSS variable generation for the Hikari design system"
repository.workspace = true

[lib]
doctest = false

[features]
default = ["scss"]
scss = []          # SCSS compilation

[dependencies]
# Hikari palette
hikari-palette = { version = "^0.1", path = "../palette" }

# Tairitsu framework (for theme context)
tairitsu-vdom = "^0.4"
tairitsu-hooks = "^0.4"
tairitsu-macros = "^0.4"

[build-dependencies]
tairitsu-packager = { version = "^0.4", default-features = false }
anyhow = "^1"
