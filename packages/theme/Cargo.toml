[package]
name = "hikari-theme"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
doctest = false

[features]
default = ["scss", "dioxus"]
scss = []       # Default SCSS compilation
dioxus = ["dep:dioxus"]  # Dioxus framework integration (optional for tairitsu)

[dependencies]
# Workspace dependencies
palette = { path = "../palette", package = "hikari-palette" }

# MCP / network and protocols (optional for tairitsu compatibility)
dioxus = { workspace = true, optional = true }
