<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikari</title>
    
    <link rel="stylesheet" href="/styles/bundle.css">
<link rel="stylesheet" href="/styles/spa.css">
<link rel="stylesheet" href="/styles/animations.css">
<script>
(() => {
  const ROUTES = {
    '': 'home',
    '/': 'home',
    '/components': 'components',
    '/components/layer1/button': 'component-button',
    '/components/layer1/form': 'component-form',
    '/components/layer1/number-input': 'component-number-input',
    '/components/layer1/search': 'component-search',
    '/components/layer1/switch': 'component-switch',
    '/components/layer1/feedback': 'component-feedback',
    '/components/layer1/display': 'component-display',
    '/components/layer1/avatar': 'component-avatar',
    '/components/layer1/image': 'component-image',
    '/components/layer1/tag': 'component-tag',
    '/components/layer1/empty': 'component-empty',
    '/components/layer1/comment': 'component-comment',
    '/components/layer1/description-list': 'component-description-list',
    '/components/layer2/navigation': 'component-navigation',
    '/components/layer2/collapsible': 'component-collapsible',
    '/components/layer2/data': 'component-data',
    '/components/layer2/table': 'component-table',
    '/components/layer2/tree': 'component-tree',
    '/components/layer2/pagination': 'component-pagination',
    '/components/layer2/qrcode': 'component-qrcode',
    '/components/layer2/timeline': 'component-timeline',
    '/components/layer2/form': 'component-form-composed',
    '/components/layer2/cascader': 'component-cascader',
    '/components/layer2/transfer': 'component-transfer',
    '/components/layer2/feedback': 'component-feedback-composed',
    '/components/layer3/media': 'component-media',
    '/components/layer3/editor': 'component-editor',
    '/components/layer3/visualization': 'component-visualization',
    '/components/layer3/user-guide': 'component-user-guide',
    '/components/layer3/zoom-controls': 'component-zoom-controls',
    '/system': 'system-overview',
    '/system/palette': 'system-palette',
    '/system/css': 'system-css',
    '/system/icons': 'system-icons',
    '/system/animations': 'system-animations',
    '/system/i18n': 'system-i18n',
    '/interactive': 'interactive',
    '/animations': 'animations',
    '/demos': 'demos-overview',
    '/demos/form': 'demos-form',
    '/demos/dashboard': 'demos-dashboard',
    '/demos/video': 'demos-video',
  };

  function getRouteId() {
    var path = location.pathname || '/';
    if (path.length > 1 && path[path.length - 1] === '/') path = path.slice(0, -1);
    if (!path) path = '/';
    return ROUTES[path] || 'not-found';
  }

  function navigate() {
    var routeId = getRouteId();
    document.querySelectorAll('.hikari-page').forEach(function(p) {
      p.classList.remove('is-active');
      p.setAttribute('aria-hidden', 'true');
    });
    var page = document.getElementById('page-' + routeId);
    if (page) {
      page.classList.add('is-active');
      page.removeAttribute('aria-hidden');
      window.scrollTo(0, 0);
    }
    // Highlight active sidebar link
    document.querySelectorAll('.hi-sidebar-item.is-active, .hi-menu-item.is-active').forEach(function(el) {
      el.classList.remove('is-active');
    });
    var currentPath = location.pathname || '/';
    var activeInner = document.querySelector('.hi-sidebar-item[href="' + currentPath + '"], .hi-menu-item-inner[href="' + currentPath + '"]');
    if (activeInner) {
      var activeLi = activeInner.closest('.hi-menu-item, .hi-sidebar-item');
      if (activeLi) activeLi.classList.add('is-active');
      // Auto-expand parent submenus so active item is visible
      var parent = activeInner.closest('.hi-submenu[data-collapsed]');
      while (parent) {
        parent.removeAttribute('data-collapsed');
        parent = parent.parentElement ? parent.parentElement.closest('.hi-submenu[data-collapsed]') : null;
      }
    }
    // Highlight active topnav link
    document.querySelectorAll('.hikari-topnav__link').forEach(function(link) {
      link.classList.remove('is-active');
      if (currentPath.startsWith(link.getAttribute('href'))) {
        link.classList.add('is-active');
      }
    });
    // Update breadcrumb
    var bcCurrent = document.getElementById('breadcrumb-current');
    if (bcCurrent) {
      var pathParts = currentPath.substring(1).split('/');
      var labels = [];
      if (pathParts[0] === 'components') {
        labels.push('Components');
        if (pathParts[1]) {
          var layerNum = pathParts[1].replace('layer', 'Layer ');
          labels.push(layerNum);
        }
        if (pathParts[2]) {
          labels.push(pathParts[2].charAt(0).toUpperCase() + pathParts[2].slice(1));
        }
      } else if (pathParts[0] === 'system') {
        labels.push('System');
        if (pathParts[1]) {
          labels.push(pathParts[1].charAt(0).toUpperCase() + pathParts[1].slice(1));
        }
      } else if (pathParts[0] === 'demos') {
        labels.push('Demos');
        if (pathParts[1]) {
          labels.push(pathParts[1].charAt(0).toUpperCase() + pathParts[1].slice(1));
        }
      } else if (currentPath === '/' || !pathParts[0]) {
        labels.push('Home');
      } else {
        labels.push(pathParts.map(function(s) { return s.charAt(0).toUpperCase() + s.slice(1); }).join(' '));
      }
      bcCurrent.textContent = labels.length > 0 ? labels[labels.length - 1] : 'Home';
    }
  }

  // Intercept clicks on internal links for SPA navigation (History API)
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a[href]');
    if (!link) return;
    var href = link.getAttribute('href');
    // Only intercept local paths (starts with /)
    if (!href || !href.startsWith('/')) return;
    // Ignore modified clicks (ctrl, shift, meta, alt)
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
    // Ignore target="_blank" links
    if (link.target === '_blank') return;
    e.preventDefault();
    if (location.pathname !== href) {
      history.pushState(null, '', href);
    }
    // Close mobile drawer on navigation
    var aside = document.getElementById('hikari-aside');
    var overlay = document.getElementById('drawer-overlay');
    if (aside) aside.classList.remove('hi-aside-drawer-open');
    if (overlay) overlay.classList.remove('hi-layout-overlay-open');
    navigate();
  });

  window.addEventListener('popstate', navigate);
  document.addEventListener('DOMContentLoaded', navigate);

  // Expose navigate globally so the packager's post-WASM rAF callback
  // can re-run the SPA router after DOM hydration.
  window.navigate = navigate;

  // Drawer toggle behaviour
  document.addEventListener('DOMContentLoaded', function() {
    var toggle = document.getElementById('drawer-toggle');
    var aside = document.getElementById('hikari-aside');
    var overlay = document.getElementById('drawer-overlay');

    function openDrawer() {
      if (aside) aside.classList.add('hi-aside-drawer-open');
      if (overlay) overlay.classList.add('hi-layout-overlay-open');
    }
    function closeDrawer() {
      if (aside) aside.classList.remove('hi-aside-drawer-open');
      if (overlay) overlay.classList.remove('hi-layout-overlay-open');
    }

    if (toggle) {
      toggle.addEventListener('click', function() {
        if (aside && aside.classList.contains('hi-aside-drawer-open')) {
          closeDrawer();
        } else {
          openDrawer();
        }
      });
    }
    if (overlay) {
      overlay.addEventListener('click', closeDrawer);
    }
    // Close drawer on navigation
    window.addEventListener('popstate', closeDrawer);
  });
})();
</script>
</head>

    <div id="app">Loading...</div>
    <!-- Import map (WASI preview2-shim + tairitsu-glue interfaces) is created
         dynamically by __tairitsu_glue__.js, which runs synchronously before
         any module scripts, guaranteeing a single complete import map. -->
    <script src="/browser-glue/__tairitsu_glue__.js?v=1776430030"></script>
    <script type="module">
        import { instantiateWithWrapper } from '/component-wrapper-loader.js?v=1776430030';

        const appRoot = document.getElementById('app');
        const setAppStatus = (text) => {
            if (!appRoot) return;
            const current = (appRoot.textContent || '').trim();
            if (current === 'Loading...') {
                appRoot.textContent = text;
            }
        };

        const clearLoadingIfUnchanged = () => {
            if (!appRoot) return;
            const current = (appRoot.textContent || '').trim();
            if (current === 'Loading...') {
                appRoot.textContent = '';
            }
        };

        const tryInvokeBootExports = async (result) => {
            const normalizeBootName = (name) => {
                const lowered = String(name || '').toLowerCase();
                if (lowered === 'run') return 'run';
                if (lowered === 'main') return 'main';
                if (lowered === 'init') return 'init';
                if (lowered === 'start') return 'start';
                return null;
            };

            const seenObjects = new Set();
            const seenFunctions = new Set();
            const discovered = [];

            const collect = (obj, depth = 0) => {
                if (!obj || typeof obj !== 'object' || depth > 3) return;
                if (seenObjects.has(obj)) return;
                seenObjects.add(obj);

                for (const [name, value] of Object.entries(obj)) {
                    if (typeof value !== 'function') continue;
                    const kind = normalizeBootName(name);
                    if (!kind) continue;
                    if (seenFunctions.has(value)) continue;
                    seenFunctions.add(value);
                    discovered.push({ kind, fn: value });
                }

                for (const [, value] of Object.entries(obj)) {
                    if (value && typeof value === 'object') {
                        collect(value, depth + 1);
                    }
                }
            };

            const targets = [
                result,
                result && result.instance,
                result && result.exports,
                result && result.instance && result.instance.exports,
            ];

            for (const target of targets) {
                collect(target);
                if (target && target.exports) collect(target.exports);
            }

            let invoked = false;

            for (const preferred of ['run', 'main', 'init']) {
                for (const entry of discovered) {
                    if (entry.kind !== preferred) continue;
                    await entry.fn();
                    invoked = true;
                }
            }

            if (!invoked) {
                const fallbackStart = discovered.find((entry) => entry.kind === 'start');
                if (fallbackStart) {
                    await fallbackStart.fn();
                    invoked = true;
                }
            }

            return invoked;
        };

        // Build imports object from registered browser glue interfaces
        const buildImports = () => {
            const imports = {};
            if (globalThis.__TAIRITSU_GLUE__ && globalThis.__TAIRITSU_GLUE__.INTERFACES) {
                for (const [shortName, exports] of Object.entries(globalThis.__TAIRITSU_GLUE__.INTERFACES)) {
                    const ifaceName = shortName.replace('@tairitsu-glue/', '');
                    const fullName = `tairitsu-browser:full/${ifaceName}@0.2.0`;
                    imports[fullName] = exports;
                }
            }
            return imports;
        };

        let bootInvoked = false;

        // Strategy: always try the jco component wrapper first (avoids a
        // redundant 50MB fetch of the raw WASM just to inspect magic bytes).
        // The wrapper internally fetches only the core module it needs.
        // Fall back to direct WASM loading only if no wrapper is available.
        try {
            const wrapperResult = await instantiateWithWrapper(buildImports());
            if (globalThis.__setWasmExports && wrapperResult) {
                globalThis.__setWasmExports(wrapperResult);
            }
            bootInvoked = await tryInvokeBootExports(wrapperResult);
        } catch (_wrapperErr) {
            // No jco wrapper or wrapper failed — load WASM directly
            const response = await fetch('/website.wasm');
            const bytes = await response.arrayBuffer();
            const magic = new Uint8Array(bytes, 0, 8);
            const isWasm =
                magic[0] === 0x00 && magic[1] === 0x61 && magic[2] === 0x73 && magic[3] === 0x6d;
            const isComponent = isWasm &&
                magic[4] === 0x0d && magic[5] === 0x00 && magic[6] === 0x01 && magic[7] === 0x00;

            if (isComponent && typeof WebAssembly.Component === 'function') {
                const component = new WebAssembly.Component(bytes);
                const componentResult = await WebAssembly.instantiate(component, buildImports());
                if (globalThis.__setWasmExports && componentResult) {
                    globalThis.__setWasmExports(componentResult);
                }
                bootInvoked = await tryInvokeBootExports(componentResult);
            } else {
                const module = await WebAssembly.compile(bytes);
                const moduleResult = await WebAssembly.instantiate(module, buildImports());
                if (globalThis.__setWasmExports && moduleResult) {
                    globalThis.__setWasmExports(moduleResult);
                }
                bootInvoked = await tryInvokeBootExports(moduleResult);
            }
        }

        if (!bootInvoked) {
            setAppStatus('Component initialized (no exported run/start entry found).');
        } else {
            clearLoadingIfUnchanged();
        }

        // WASM just replaced #app content; re-run SPA router so the
        // correct page is activated for the current URL path.
        // Use rAF to ensure the browser has flushed the new DOM into
        // the render tree before we query it for .hikari-page elements.
        requestAnimationFrame(function() {
            if (typeof navigate === 'function') {
                navigate();
            } else {
                window.dispatchEvent(new PopStateEvent('popstate'));
            }
        });

        // Fix SVG elements created with wrong namespace (HTML instead of SVG).
        // WIT document::createElement always creates HTML-namespaced elements,
        // which makes SVG graphics invisible. This post-process step replaces
        // any HTML-namespaced <svg> elements with proper SVG namespaced ones.
        (function fixSvgNamespaces() {
            const SVG_NS = 'http://www.w3.org/2000/svg';
            document.querySelectorAll('svg').forEach(svg => {
                if (svg.namespaceURI === SVG_NS) return;
                const parent = svg.parentNode;
                if (!parent) return;
                const newSvg = document.createElementNS(SVG_NS, 'svg');
                for (const attr of svg.attributes) {
                    // Preserve viewBox case sensitivity
                    if (attr.name.toLowerCase() === 'viewbox') {
                        newSvg.setAttribute('viewBox', attr.value);
                    } else {
                        newSvg.setAttribute(attr.name, attr.value);
                    }
                }
                // Re-parse innerHTML in SVG namespace context so all
                // child elements (<path>, <circle>, etc.) get SVG namespace.
                newSvg.innerHTML = svg.innerHTML;
                parent.replaceChild(newSvg, svg);
            });
        })();

        // Glow mouse-following spotlight effect
        (function initGlow() {
            let rafId = null;
            const activeGlow = new Map();

            document.addEventListener('mouseenter', function(e) {
                const glow = e.target.closest ? e.target.closest('[data-glow]') : null;
                if (!glow || activeGlow.has(glow)) return;
                activeGlow.set(glow, { x: 50, y: 50 });
                if (!rafId) scheduleFrame();
            }, true);

            document.addEventListener('mousemove', function(e) {
                const glow = e.target.closest ? e.target.closest('[data-glow]') : null;
                if (!glow || !activeGlow.has(glow)) return;
                const rect = glow.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                    activeGlow.get(glow).x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
                    activeGlow.get(glow).y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
                }
            }, true);

            document.addEventListener('mouseleave', function(e) {
                const glow = e.target.closest ? e.target.closest('[data-glow]') : null;
                if (!glow) return;
                activeGlow.delete(glow);
                glow.style.setProperty('--glow-x', '50%');
                glow.style.setProperty('--glow-y', '50%');
            }, true);

            function scheduleFrame() {
                rafId = requestAnimationFrame(function tick() {
                    for (const [el, pos] of activeGlow) {
                        el.style.setProperty('--glow-x', pos.x + '%');
                        el.style.setProperty('--glow-y', pos.y + '%');
                    }
                    if (activeGlow.size > 0) {
                        rafId = requestAnimationFrame(tick);
                    } else {
                        rafId = null;
                    }
                });
            }
        })();

        // Custom scrollbar — mirrors the legacy WASM scrollbar_container logic.
        // Creates a DOM-based scrollbar (track + thumb) alongside the scrollable
        // content layer, hiding the native scrollbar.
        (function initCustomScrollbars() {
            var THUMB_MIN = 20;
            var SELECTORS = ['.hi-aside-content'];

            function updateThumb(content, track, thumb) {
                var sh = content.scrollHeight;
                var ch = content.clientHeight;
                if (sh <= ch) { thumb.style.display = 'none'; track.classList.add('custom-scrollbar-hidden'); return; }
                thumb.style.display = '';
                track.classList.remove('custom-scrollbar-hidden');
                var th = track.clientHeight;
                var ideal = (ch / sh) * ch;
                var actual = Math.max(ideal, THUMB_MIN);
                thumb.style.height = actual + 'px';
                var maxScroll = sh - ch;
                var range = th - actual;
                var top = maxScroll > 0 ? (content.scrollTop / maxScroll) * range : 0;
                thumb.style.top = top + 'px';
            }

            function setup(container) {
                if (container.classList.contains('custom-scrollbar-container')) return;
                container.classList.add('custom-scrollbar-container');

                var cs = window.getComputedStyle(container);
                var pt = cs.paddingTop, pr = cs.paddingRight, pb = cs.paddingBottom;
                container.style.padding = '0';

                var wrapper = document.createElement('div');
                wrapper.className = 'custom-scrollbar-wrapper';
                wrapper.setAttribute('data-custom-scrollbar', 'wrapper');

                var contentLayer = document.createElement('div');
                contentLayer.className = 'custom-scrollbar-content';
                contentLayer.setAttribute('data-custom-scrollbar', 'content');
                contentLayer.style.paddingTop = pt;
                contentLayer.style.paddingRight = pr;
                contentLayer.style.paddingBottom = pb;

                while (container.firstChild) contentLayer.appendChild(container.firstChild);
                wrapper.appendChild(contentLayer);

                var track = document.createElement('div');
                track.className = 'custom-scrollbar-track';
                track.setAttribute('data-custom-scrollbar', 'track');

                var thumb = document.createElement('div');
                thumb.className = 'custom-scrollbar-thumb';
                thumb.setAttribute('data-custom-scrollbar', 'thumb');

                track.appendChild(thumb);
                wrapper.appendChild(track);
                container.appendChild(wrapper);

                function onUpdate() { updateThumb(contentLayer, track, thumb); }

                contentLayer.addEventListener('scroll', function() {
                    onUpdate();
                    thumb.classList.add('custom-scrollbar-thumb--scrolling');
                    clearTimeout(thumb._scrollTimer);
                    thumb._scrollTimer = setTimeout(function() {
                        thumb.classList.remove('custom-scrollbar-thumb--scrolling');
                    }, 600);
                });

                if (window.ResizeObserver) {
                    new ResizeObserver(onUpdate).observe(contentLayer);
                }
                window.addEventListener('resize', onUpdate);

                // Hover expand track
                track.addEventListener('mouseenter', function() {
                    track.classList.add('custom-scrollbar-track--active');
                });
                track.addEventListener('mouseleave', function() {
                    track.classList.remove('custom-scrollbar-track--active');
                });

                // Drag-to-scroll
                var dragging = false, startY = 0, startScrollTop = 0, cachedThumbH = 0;
                thumb.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    dragging = true;
                    startY = e.clientY;
                    startScrollTop = contentLayer.scrollTop;
                    cachedThumbH = thumb.offsetHeight;
                    document.body.style.userSelect = 'none';
                    document.body.style.cursor = 'grabbing';
                });
                document.addEventListener('mousemove', function(e) {
                    if (!dragging) return;
                    var dy = e.clientY - startY;
                    var th = track.clientHeight;
                    var maxScroll = contentLayer.scrollHeight - contentLayer.clientHeight;
                    var range = th - cachedThumbH;
                    if (range > 0 && maxScroll > 0) {
                        contentLayer.scrollTop = startScrollTop + (dy / range) * maxScroll;
                    }
                });
                document.addEventListener('mouseup', function() {
                    if (!dragging) return;
                    dragging = false;
                    document.body.style.userSelect = '';
                    document.body.style.cursor = '';
                });

                // Click-to-jump on track
                track.addEventListener('click', function(e) {
                    if (e.target === thumb) return;
                    var rect = track.getBoundingClientRect();
                    var clickY = e.clientY - rect.top;
                    var th = track.clientHeight;
                    var maxScroll = contentLayer.scrollHeight - contentLayer.clientHeight;
                    contentLayer.scrollTop = (clickY / th) * maxScroll;
                });

                onUpdate();
            }

            function initAll() {
                SELECTORS.forEach(function(sel) {
                    document.querySelectorAll(sel).forEach(setup);
                });
            }
            initAll();

            // Re-init after SPA navigation (MutationObserver for robustness)
            if (window.MutationObserver) {
                var debounce = null;
                new MutationObserver(function() {
                    clearTimeout(debounce);
                    debounce = setTimeout(initAll, 100);
                }).observe(document.body, { childList: true, subtree: true });
            }
        })();

        // Hot-reload client: connects to dev server SSE endpoint.
        // On rebuild notification, reloads the page. Gives up after 3
        // consecutive failures and suggests using release builds.
        (function initHotReload() {
            let failures = 0;
            const MAX_FAILURES = 3;
            function connect() {
                const es = new EventSource('/__tairitsu_reload');
                es.onmessage = function(ev) {
                    if (ev.data === 'reload') {
                        console.log('[tairitsu] rebuild detected, reloading…');
                        location.reload();
                    }
                };
                es.onerror = function() {
                    failures++;
                    es.close();
                    if (failures >= MAX_FAILURES) {
                        console.warn(
                            '[tairitsu] hot-reload connection failed ' + MAX_FAILURES +
                            ' times. Dev server may not be running.' +
                            '\\nFor production builds, use: tairitsu build --release'
                        );
                        return;
                    }
                    setTimeout(connect, 3000);
                };
            }
            connect();
        })();
    </script>
